<style>
  /* ===========================================================
     INDIAN ACCOUNTS SOLVER — v3.0
     Dual Theme: White & Gold (default) | Black & Blue (toggle)
     All existing IDs, classes, JS logic preserved exactly.
     =========================================================== */

  /* ── Shared Design Tokens ── */
  :root {
    --radius-sm:            8px;
    --radius-md:            12px;
    --radius-lg:            16px;
    --header-height:        72px;
    --header-height-mobile: 60px;
  }

  /* ── WHITE & GOLD THEME (Default) ── */
  [data-theme="white"] {
    --bg-primary:       #f8f9fc;
    --bg-secondary:     #ffffff;
    --bg-card:          rgba(255, 255, 255, 0.88);
    --bg-input:         rgba(255, 255, 255, 0.96);
    --bg-header:        rgba(255, 253, 245, 0.95);
    --bg-table-hd:      rgba(255, 248, 220, 0.95);
    --bg-module-card:   rgba(255, 255, 255, 0.92);
    --bg-deep:          #f4f4f8;

    --accent-primary:   #d4af37;
    --accent-hover:     #b8860b;
    --accent-light:     #ffd700;
    --accent-glow:      rgba(212, 175, 55, 0.22);
    --accent-soft:      rgba(212, 175, 55, 0.08);

    --text-primary:     #111827;
    --text-secondary:   #6b7280;
    --text-muted:       #9ca3af;
    --text-accent:      #92400e;

    --border-color:     rgba(212, 175, 55, 0.30);
    --border-strong:    rgba(212, 175, 55, 0.55);
    --border-subtle:    rgba(212, 175, 55, 0.14);

    --shadow-soft:      0 4px 24px rgba(212, 175, 55, 0.12);
    --shadow-card:      0 8px 32px rgba(212, 175, 55, 0.10), 0 1px 4px rgba(0, 0, 0, 0.04);
    --shadow-hover:     0 16px 48px rgba(212, 175, 55, 0.22), 0 4px 16px rgba(0, 0, 0, 0.06);
    --shadow-btn:       0 4px 18px rgba(212, 175, 55, 0.38);

    --gradient-accent:  linear-gradient(135deg, #d4af37 0%, #b8860b 60%, #ffd700 100%);
    --gradient-bar:     linear-gradient(90deg, #d4af37, #b8860b, transparent 80%);

    /* Legacy variable remaps used by JS-generated inline HTML */
    --ink:    #1f1a0e;
    --paper:  #fffbf0;
    --saffron: #d4af37;
    --gold:   #b8860b;
    --green:  #059669;
    --red:    #dc2626;
    --ledger: rgba(212, 175, 55, 0.07);
    --rule:   rgba(212, 175, 55, 0.20);
    --accent: #d4af37;

    --badge-dr-bg:     rgba(220, 38, 38, 0.10);
    --badge-dr-color:  #b91c1c;
    --badge-cr-bg:     rgba(5, 150, 105, 0.10);
    --badge-cr-color:  #047857;
    --amount-dr:       #b91c1c;
    --amount-cr:       #047857;
    --th-color:        #92400e;
    --scrollbar-thumb: rgba(212, 175, 55, 0.45);

    /* Aliases used by existing .card::before, .logo-icon etc. */
    --accent-blue: #d4af37;
    --accent-cyan: #b8860b;
  }

  /* ── BLACK & BLUE THEME (Toggle) ── */
  [data-theme="black"] {
    --bg-primary:       #0a0b10;
    --bg-secondary:     #050508;
    --bg-card:          rgba(15, 20, 30, 0.65);
    --bg-input:         rgba(8, 12, 22, 0.75);
    --bg-header:        rgba(5, 8, 18, 0.88);
    --bg-table-hd:      rgba(20, 40, 90, 0.70);
    --bg-module-card:   rgba(12, 18, 34, 0.75);
    --bg-deep:          #050508;

    --accent-primary:   #3b82f6;
    --accent-hover:     #06b6d4;
    --accent-light:     #60a5fa;
    --accent-glow:      rgba(59, 130, 246, 0.22);
    --accent-soft:      rgba(59, 130, 246, 0.08);

    --text-primary:     #e2e8f0;
    --text-secondary:   #94a3b8;
    --text-muted:       #64748b;
    --text-accent:      #93c5fd;

    --border-color:     rgba(100, 180, 255, 0.15);
    --border-strong:    rgba(100, 180, 255, 0.38);
    --border-subtle:    rgba(100, 180, 255, 0.08);

    --shadow-soft:      0 4px 24px rgba(59, 130, 246, 0.12);
    --shadow-card:      0 8px 32px rgba(0, 0, 0, 0.45), 0 1px 4px rgba(59, 130, 246, 0.06);
    --shadow-hover:     0 16px 48px rgba(59, 130, 246, 0.22), 0 4px 16px rgba(0, 0, 0, 0.30);
    --shadow-btn:       0 4px 18px rgba(59, 130, 246, 0.38);

    --gradient-accent:  linear-gradient(135deg, #3b82f6 0%, #06b6d4 100%);
    --gradient-bar:     linear-gradient(90deg, #3b82f6, #06b6d4, transparent 80%);

    /* Legacy remaps */
    --ink:    #060c18;
    --paper:  #dbeafe;
    --saffron: #3b82f6;
    --gold:   #60a5fa;
    --green:  #10b981;
    --red:    #f87171;
    --ledger: rgba(59, 130, 246, 0.08);
    --rule:   rgba(100, 180, 255, 0.18);
    --accent: #3b82f6;

    --badge-dr-bg:     rgba(248, 113, 113, 0.14);
    --badge-dr-color:  #fca5a5;
    --badge-cr-bg:     rgba(16, 185, 129, 0.14);
    --badge-cr-color:  #6ee7b7;
    --amount-dr:       #fca5a5;
    --amount-cr:       #6ee7b7;
    --th-color:        #93c5fd;
    --scrollbar-thumb: rgba(59, 130, 246, 0.40);

    --accent-blue: #3b82f6;
    --accent-cyan: #06b6d4;
  }

  /* ── Theme-switch smooth crossfade ── */
  .theme-switching *,
  .theme-switching *::before,
  .theme-switching *::after {
    transition:
      background-color 0.4s ease,
      color 0.4s ease,
      border-color 0.4s ease,
      box-shadow 0.4s ease !important;
  }

  /* ── Reset ── */
  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* ── Body ── */
  body {
    background-color: var(--bg-primary);
    color: var(--text-primary);
    font-family: 'Inter', 'Noto Sans', sans-serif;
    min-height: 100vh;
  }

  [data-theme="white"] body {
    background-image:
      radial-gradient(ellipse 80% 60% at 10% 5%, rgba(255, 248, 225, 0.65) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 90% 95%, rgba(255, 236, 153, 0.28) 0%, transparent 55%);
  }

  [data-theme="black"] body {
    background-image:
      radial-gradient(ellipse 90% 60% at  0%   0%, rgba(30,  58, 138, 0.22) 0%, transparent 55%),
      radial-gradient(ellipse 70% 55% at 100% 100%, rgba(14, 165, 233, 0.14) 0%, transparent 55%);
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    animation: meshDrift 18s ease-in-out infinite alternate;
  }

  [data-theme="black"] body::before {
    background-image:
      radial-gradient(circle at 15% 85%, rgba(59, 130, 246, 0.05) 0%, transparent 40%),
      radial-gradient(circle at 85% 15%, rgba(6,  182, 212, 0.04) 0%, transparent 40%);
  }

  [data-theme="white"] body::before {
    background-image:
      radial-gradient(circle at 20% 80%, rgba(212, 175, 55, 0.04) 0%, transparent 45%),
      radial-gradient(circle at 80% 20%, rgba(212, 175, 55, 0.03) 0%, transparent 45%);
  }

  @keyframes meshDrift {
    from { transform: scale(1);    opacity: 0.6; }
    to   { transform: scale(1.08); opacity: 1;   }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0);    }
  }

  /* ── Header ── */
  header {
    background: var(--bg-header);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    color: var(--text-primary);
    padding: 14px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    border-bottom: 1px solid var(--border-subtle);
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: var(--shadow-soft);
    min-height: var(--header-height);
  }
